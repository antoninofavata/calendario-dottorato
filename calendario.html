<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<style>
body {
  font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.filters {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.filters button {
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  background: #e5e7eb;
  cursor: pointer;
  font-size: 0.8em;
}

.filters button.active {
  background: #2563eb;
  color: white;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 15px;
  font-size: 0.8em;
}

#calendar {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.fc-event {
  border-radius: 8px;
  border: none;
  font-size: 0.75em;
}
</style>

</head>
