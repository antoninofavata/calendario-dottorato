<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body {
  font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* FILTRI */
.filters {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.filters button {
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  background: #e5e7eb;
  cursor: pointer;
  font-size: 0.8em;
}

.filters button.active {
  background: #2563eb;
  color: white;
}

/* LEGENDA */
.legend {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.legend span {
  font-size: 0.8em;
}

/* CALENDARIO */
#calendar {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.fc-event {
  border-radius: 8px;
  border: none;
  font-size: 0.75em;
}
</style>

</head>

<body>

<div class="container">
<h2>PhD Program in Structural and Geotechnical Engineering</h2>

<!-- FILTRI -->
<div class="filters">
  <button onclick="filterEvents('all')" class="active">All</button>
  <button onclick="filterEvents('A')">A – Methodological tools</button>
  <button onclick="filterEvents('B1')">Mechanics</button>
  <button onclick="filterEvents('B2')">Structural Eng.</button>
  <button onclick="filterEvents('B3')">Geotechnical Eng.</button>
  <button onclick="filterEvents('S')">Seminars</button>
</div>

<!-- LEGENDA -->
<div class="legend">
  <span>🔵 Methodological tools</span>
  <span>🟢 Mechanics</span>
  <span>🟠 Structural Eng.</span>
  <span>🟣 Geotechnical</span>
  <span>⚫ Seminars</span>
</div>

<div id="calendar"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

 const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',
    height: 'auto',

    eventContent: function(arg) {
      return {
        html: `
          <div style="white-space: normal; line-height:1.3;">
            <div>
              <span style="color:${arg.event.backgroundColor}; font-size:1.1em;">●</span>
              <strong>${arg.event.title}</strong>
            </div>
            <div style="font-size:0.75em;">⏰ ${arg.event.extendedProps.time}</div>
            <div style="font-size:0.75em;">📍 ${arg.event.extendedProps.location}</div>
            <div style="font-size:0.75em;">👤 ${arg.event.extendedProps.lecturer}</div>
          </div>
        `
      };
    },

    events: [

      // ===== A – Methodological tools =====
      { start:'2026-05-05T15:00:00', end:'2026-05-05T17:00:00' },
      { start:'2026-05-12T15:00:00', end:'2026-05-12T17:00:00' },
      { start:'2026-05-19T15:00:00', end:'2026-05-19T17:00:00' },
      { start:'2026-05-26T15:00:00', end:'2026-05-26T17:00:00' },
      { start:'2026-05-07T16:00:00', end:'2026-05-07T18:00:00' },
      { start:'2026-05-14T16:00:00', end:'2026-05-14T18:00:00' },
      { start:'2026-05-21T16:00:00', end:'2026-05-21T18:00:00' },
      { start:'2026-05-28T16:00:00', end:'2026-05-28T18:00:00' },
      { start:'2026-06-04T15:00:00', end:'2026-06-04T17:00:00' },
      { start:'2026-06-16T15:00:00', end:'2026-06-16T17:00:00' }

    ].map(e => ({
        title: 'Scientific Computing and Python Programming',
        ...e,
        color: '#2563eb',
        extendedProps: {
          time: e.start.includes('T15') ? '15:00–17:00' : '16:00–18:00',
          location: 'Room 329',
          lecturer: 'Alba Bisante',
          group: 'A'
        }
    }))

  }
);

calendar.render();

window.filterEvents = function(group) {

  document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  calendar.getEvents().forEach(ev => {
    if (group === 'all' || ev.extendedProps.group === group) {
      ev.setProp('display', 'auto');
    } else {
      ev.setProp('display', 'none');
    }
  });
}

});
</script>

</body>
</html>
