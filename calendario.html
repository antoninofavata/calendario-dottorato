<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f8;
  }

  .container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1f2937;
  }

  .legend, .filters {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .legend span, .filters button {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.8em;
  }

  .filters button {
    border: none;
    cursor: pointer;
    background: #e5e7eb;
  }

  .filters button.active {
    background: #2563eb;
    color: white;
  }

  #calendar {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .fc-event {
    border-radius: 8px;
    border: none;
    font-size: 0.75em;
  }

  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: none;
    z-index: 1000;
  }

  .popup h3 {
    margin-top: 0;
  }

  .popup-close {
    cursor: pointer;
    color: #2563eb;
    margin-top: 10px;
    display: inline-block;
  }
</style>

</head>

<body>

<div class="container">
  <h2>PhD Program in Structural and Geotechnical Engineering</h2>

  <!-- FILTRI -->
  <div class="filters">
    <button onclick="filterEvents('all')" class="active">All</button>
    <button onclick="filterEvents('A')">Fase A</button>
    <button onclick="filterEvents('B')">Fase B</button>
  </div>

  <!-- LEGENDA -->
  <div class="legend">
    <span style="background:#2563eb;color:white;">Fase A</span>
    <span style="background:#16a34a;color:white;">Scienza delle Costruzioni</span>
    <span style="background:#ea580c;color:white;">Tecnica delle Costruzioni</span>
    <span style="background:#7c3aed;color:white;">Geotecnica</span>
  </div>

  <div id="calendar"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3 id="popup-title"></h3>
  <p id="popup-time"></p>
  <p id="popup-location"></p>
  <span class="popup-close" onclick="closePopup()">Close</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

 let currentFilter = 'all';

 const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',
    height: 'auto',

    eventContent: function(arg) {
      return {
        html: `
          <div style="white-space: normal;">
            <strong>${arg.event.title}</strong><br>
            <span style="font-size:0.75em;">⏰ ${arg.event.extendedProps.time}</span><br>
            <span style="font-size:0.75em;">📍 ${arg.event.extendedProps.location}</span>
          </div>
        `
      };
    },

    eventClick: function(info) {
      document.getElementById('popup-title').innerText = info.event.title;
      document.getElementById('popup-time').innerText = "Time: " + info.event.extendedProps.time;
      document.getElementById('popup-location').innerText = "Location: " + info.event.extendedProps.location;
      document.getElementById('popup').style.display = 'block';
    },

    events: [
      {
        title: 'Scientific Computing and Python Programming',
        start: '2026-05-05T15:00:00',
        end: '2026-05-05T17:00:00',
        color: '#2563eb',
        extendedProps: {
          time: '15:00–17:00',
          location: 'Room 329',
          phase: 'A'
        }
      },
      {
        title: 'Scientific Computing and Python Programming',
        start: '2026-05-07T16:00:00',
        end: '2026-05-07T18:00:00',
        color: '#2563eb',
        extendedProps: {
          time: '16:00–18:00',
          location: 'Room 329',
          phase: 'A'
        }
      }
    ]
  }
);

calendar.render();

window.filterEvents = function(phase) {
  currentFilter = phase;

  document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  calendar.getEvents().forEach(event => {
    if (phase === 'all' || event.extendedProps.phase === phase) {
      event.setProp('display', 'auto');
    } else {
      event.setProp('display', 'none');
    }
  });
}

});

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}
</script>

</body>
</html>
