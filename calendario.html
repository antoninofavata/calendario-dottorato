<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 60px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  margin-bottom: 5px;
  font-weight: 600;
}

.subtitle {
  text-align: center;
  color: #555;
  margin-bottom: 25px;
}

.filters {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.filters button {
  border: 1px solid #d1d5db;
  padding: 6px 10px;
  border-radius: 6px;
  background: white;
  cursor: pointer;
  font-size: 0.8em;
}

.filters button.active {
  background: #111827;
  color: white;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  font-size: 0.8em;
}

.legend span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

#calendar {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.fc-event {
  border-radius: 8px;
  border: none;
  font-size: 0.75em;
}

.fc-toolbar-title {
  font-size: 1.3em;
  font-weight: 500;
}
</style>

</head>

<body>

<div class="container">
<h2>
  PhD Program in<br>
  Structural and Geotechnical Engineering
</h2>

<div class="filters">
  <button onclick="filterEvents(event,'all')" class="active">All</button>
  <button onclick="filterEvents(event,'A')">A – Methodological tools</button>
  <button onclick="filterEvents(event,'B1')">B – Mechanics of Solids and Structures</button>
  <button onclick="filterEvents(event,'B2')">B – Structural Engineering</button>
  <button onclick="filterEvents(event,'B3')">B – Geotechnical Engineering</button>
  <button onclick="filterEvents(event,'S')">Seminars/Short Courses</button>
</div>

<div class="legend">
  <span><span class="legend-dot" style="background:rgb(0,103,120)"></span> Methodological tools</span>
  <span><span class="legend-dot" style="background:rgb(112,164,137)"></span> Mechanics of Solids and Structures</span>
  <span><span class="legend-dot" style="background:rgb(199,153,0)"></span> Structural Engineering</span>
  <span><span class="legend-dot" style="background:rgb(197,76,0)"></span> Geotechnical Engineering</span>
  <span><span class="legend-dot" style="background:rgb(130,36,51)"></span> Seminars/Short Courses</span>
</div>

<div id="calendar"></div>
</div>

<script>

  S: 'rgb(130,36,51)'
};

  document.getElementById('calendar'),

    initialView: 'dayGridMonth',
    height: 'auto',

              <span style="
                display:inline-block;
                width:8px;
                height:8px;
                border-radius:50%;
                background:${color};
                margin-right:6px;
              "></span>
              <strong>${arg.event.title}</strong>
            </div>

            <div style="font-size:0.75em; color:#444;">
              👤 ${arg.event.extendedProps.lecturer}
            </div>

            <div style="font-size:0.75em;">⏰ ${arg.event.extendedProps.time}</div>
            <div style="font-size:0.75em;">📍 ${arg.event.extendedProps.location}</div>

          </div>
        `
      };
    },

events: [

  // ===== Scientific Computing and Python Programming
  { title:'Scientific Computing and Python Programming', start:'2026-05-05T15:00:00', end:'2026-05-05T17:00:00',
    extendedProps:{ time:'15:00–17:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  { title:'Scientific Computing and Python Programming', start:'2026-05-21T16:00:00', end:'2026-05-21T18:00:00',
    extendedProps:{ time:'16:00–18:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  { title:'Scientific Computing and Python Programming', start:'2026-05-26T15:00:00', end:'2026-05-26T17:00:00',
    extendedProps:{ time:'15:00–17:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  { title:'Scientific Computing and Python Programming', start:'2026-05-28T16:00:00', end:'2026-05-28T18:00:00',
    extendedProps:{ time:'16:00–18:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  { title:'Scientific Computing and Python Programming', start:'2026-06-04T15:00:00', end:'2026-06-04T17:00:00',
    extendedProps:{ time:'15:00–17:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  { title:'Scientific Computing and Python Programming', start:'2026-06-16T15:00:00', end:'2026-06-16T17:00:00',
    extendedProps:{ time:'15:00–17:00', location:'Meeting Room ARCH', lecturer:'Alba Bisante', group:'A'}},

  // ===== Probability
  { title:'Probability Theory and Statistics', start:'2026-05-13T09:00:00', end:'2026-05-13T13:00:00',

  { title:'Probability Theory and Statistics', start:'2026-05-20T09:00:00', end:'2026-05-20T13:00:00',
    extendedProps:{ time:'09:00–13:00', location:'Room 329 SPV', lecturer:'Claudio Durastanti', group:'A'}},

  { title:'Probability Theory and Statistics', start:'2026-05-27T09:00:00', end:'2026-05-27T13:00:00',
    extendedProps:{ time:'09:00–13:00', location:'Room 329 SPV', lecturer:'Claudio Durastanti', group:'A'}},

  { title:'Probability Theory and Statistics', start:'2026-10-07T09:00:00', end:'2026-10-07T13:00:00',

  { title:'From open loop data to closed loop poles', start:'2026-05-20T15:00:00', end:'2026-05-20T16:00:00',
    extendedProps:{ time:'15:00', location:'Room 329 SPV', lecturer:'Dionisio Bernal', group:'S'}}

]
});

calendar.render();

// ===== FILTER
window.filterEvents = function(e, group) {

  document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
  e.target.classList.add('active');

  calendar.getEvents().forEach(ev => {
    if (group === 'all' || ev.extendedProps.group === group) {
      ev.setProp('display', 'auto');
    } else {
      ev.setProp('display', 'none');
    }
  });
}

});
</script>

</body>
</html>
