<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body {
  font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

#calendar {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.fc-event {
  border-radius: 8px;
  border: none;
  font-size: 0.75em;
}
</style>

</head>

<body>

<div class="container">
<h2>PhD Program in Structural and Geotechnical Engineering</h2>
<div id="calendar"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

 const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',
    height: 'auto',

    eventContent: function(arg) {
      return {
        html: `
          <div style="white-space: normal; line-height:1.3;">
            <div style="font-weight:600;">${arg.event.title}</div>
            <div style="font-size:0.75em; color:#555;">⏰ ${arg.event.extendedProps.time}</div>
            <div style="font-size:0.75em; color:#555;">📍 ${arg.event.extendedProps.location}</div>
            <div style="font-size:0.75em; color:#777;">👤 ${arg.event.extendedProps.lecturer}</div>
          </div>
        `
      };
    },

    events: [

      // ===== Scientific Computing (Phase A) =====

      { start:'2026-05-05T15:00:00', end:'2026-05-05T17:00:00' },
      { start:'2026-05-12T15:00:00', end:'2026-05-12T17:00:00' },
      { start:'2026-05-19T15:00:00', end:'2026-05-19T17:00:00' },
      { start:'2026-05-26T15:00:00', end:'2026-05-26T17:00:00' },

      { start:'2026-05-07T16:00:00', end:'2026-05-07T18:00:00' },
      { start:'2026-05-14T16:00:00', end:'2026-05-14T18:00:00' },
      { start:'2026-05-21T16:00:00', end:'2026-05-21T18:00:00' },
      { start:'2026-05-28T16:00:00', end:'2026-05-28T18:00:00' },

      { start:'2026-06-04T15:00:00', end:'2026-06-04T17:00:00' },
      { start:'2026-06-16T15:00:00', end:'2026-06-16T17:00:00' }

    ].map(e => ({
        title: 'Scientific Computing and Python Programming',
        ...e,
        color: '#2563eb',
        extendedProps: {
          time: e.start.includes('T15') ? '15:00–17:00' : '16:00–18:00',
          location: 'Room 329',
          lecturer: 'Alba Bisante'
        }
    }))

  }
);

calendar.render();

});
</script>

</body>
</html>
