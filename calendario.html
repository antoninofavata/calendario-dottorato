<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body {
  font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.legend, .filters {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.legend span, .filters button {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 0.8em;
}

.filters button {
  border: none;
  background: #e5e7eb;
  cursor: pointer;
}

.filters button.active {
  background: #2563eb;
  color: white;
}

#calendar {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.fc-event {
  border-radius: 8px;
  border: none;
  font-size: 0.75em;
}

.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container">
<h2>PhD Program in Structural and Geotechnical Engineering</h2>

<!-- FILTRI -->
<div class="filters">
  <button onclick="filterEvents('all')" class="active">All</button>
  <button onclick="filterEvents('A')">Phase A</button>
  <button onclick="filterEvents('B')">Phase B</button>
  <button onclick="filterEvents('seminar')">Seminars</button>
</div>

<!-- LEGENDA -->
<div class="legend">
  <span style="background:#2563eb;color:white;">Phase A</span>
  <span style="background:#16a34a;color:white;">Mechanics of Solids and Structures</span>
  <span style="background:#ea580c;color:white;">Structural Engineering</span>
  <span style="background:#7c3aed;color:white;">Geotechnical Engineering</span>
  <span style="background:#6b7280;color:white;">Seminars</span>
</div>

<div id="calendar"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3 id="title"></h3>
  <p id="time"></p>
  <p id="location"></p>
  <p id="lecturer"></p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

 const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',

    eventContent: function(arg) {
      return {
        html: `
        <div style="white-space: normal;">
          <strong>${arg.event.title}</strong><br>
          <span>⏰ ${arg.event.extendedProps.time}</span><br>
          <span>📍 ${arg.event.extendedProps.location}</span>
        </div>`
      };
    },

    eventClick: function(info) {
      document.getElementById('title').innerText = info.event.title;
      document.getElementById('time').innerText = "Time: " + info.event.extendedProps.time;
      document.getElementById('location').innerText = "Location: " + info.event.extendedProps.location;
      document.getElementById('lecturer').innerText = "Lecturer: " + info.event.extendedProps.lecturer;
      document.getElementById('popup').style.display = 'block';
    },

    events: [

      // Phase A
      {
        title: 'Scientific Computing and Python Programming',
        start: '2026-05-05T15:00:00',
        end: '2026-05-05T17:00:00',
        color: '#2563eb',
        extendedProps: {
          time: '15:00–17:00',
          location: 'Room 329',
          lecturer: 'Alba Bisante',
          group: 'A'
        }
      }

    ]
  }
);

calendar.render();

window.filterEvents = function(group) {
  document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  calendar.getEvents().forEach(ev => {
    if (group === 'all' || ev.extendedProps.group === group) {
      ev.setProp('display', 'auto');
    } else {
      ev.setProp('display', 'none');
    }
  });
}

});
</script>

</body>
</html>
