<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body>

<h2>Doctoral Courses Calendar</h2>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'dayGridMonth',
      locale: 'en',
      height: 'auto',

      events: [
  { title: 'Scientific Computing and Python Programming', start: '2026-05-05T15:00:00', end: '2026-05-05T17:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-12T15:00:00', end: '2026-05-12T17:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-19T15:00:00', end: '2026-05-19T17:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-26T15:00:00', end: '2026-05-26T17:00:00' },

  { title: 'Scientific Computing and Python Programming', start: '2026-05-07T16:00:00', end: '2026-05-07T18:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-14T16:00:00', end: '2026-05-14T18:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-21T16:00:00', end: '2026-05-21T18:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-05-28T16:00:00', end: '2026-05-28T18:00:00' },

  { title: 'Scientific Computing and Python Programming', start: '2026-06-04T15:00:00', end: '2026-06-04T17:00:00' },
  { title: 'Scientific Computing and Python Programming', start: '2026-06-16T15:00:00', end: '2026-06-16T17:00:00' }
]
    }
  );

  calendar.render();

});
</script>

</body>
</html>
